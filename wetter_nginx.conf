server {
    listen 80;

    server_name wetter.larsmueller.net;

    location /wind/current.json {
        alias /var/www/wetterradar/data/current.json;

        # Ensure the file is served correctly
        add_header Content-Type application/json;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # Leaflet-velocity wind fields for multiple regions
    location /wind/global.json {
        alias /var/www/wetterradar/data/wind-global.json;
        add_header Content-Type application/json;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    location /wind/europe.json {
        alias /var/www/wetterradar/data/wind-europe.json;
        add_header Content-Type application/json;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    location /wind/germany.json {
        alias /var/www/wetterradar/data/wind-germany.json;
        add_header Content-Type application/json;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    location / {
        root /var/www/wetterradar;
        index index.html;
    }

    # DWD Satellit WMS Proxy (same-origin)
    location = /dwd/sat/wms {
        # Direkter WMS-Endpunkt statt /ows, um Upstream-Gateway-Probleme zu vermeiden.
        proxy_pass https://maps.dwd.de/geoserver/dwd/wms$is_args$args;
        proxy_set_header Host maps.dwd.de;
        proxy_ssl_server_name on;
        proxy_ssl_name maps.dwd.de;
        proxy_set_header Accept "image/*,*/*;q=0.8";
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_connect_timeout 5s;
        proxy_read_timeout 20s;
        proxy_send_timeout 20s;
        proxy_intercept_errors on;
        error_page 500 502 503 504 =200 /__dwd_empty_tile.gif;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=60, stale-while-revalidate=120" always;
    }

    location = /__dwd_empty_tile.gif {
        internal;
        empty_gif;
        add_header Content-Type image/gif always;
        add_header Cache-Control "no-store" always;
    }
}
